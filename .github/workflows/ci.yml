name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests, TypeScript, and production build
        run: npm run check

  browser-e2e:
    name: Browser E2E · Chromium
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run desktop viewport and accessibility tests
        run: npm run test:e2e

      - name: Upload browser diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: browser-e2e-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  electron-e2e:
    name: Electron E2E · Windows
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      REHOYO_DISABLE_LOCAL_CONFIG: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run secured Electron launch test
        run: npm run test:electron

      - name: Upload Electron diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: electron-e2e-diagnostics
          path: |
            playwright-report-electron/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
